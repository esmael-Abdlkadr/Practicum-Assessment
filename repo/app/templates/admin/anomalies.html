{% extends "base.html" %}

{% block title %}Anomaly Dashboard{% endblock %}

{% block content %}
<div class="page-hero">
  <div>
    <p class="section-eyebrow mb-1">Security</p>
    <h1 class="page-title mb-0">Anomalous Login Patterns</h1>
    <p class="page-subtitle mb-0">Review and acknowledge suspicious access behavior.</p>
  </div>
  <div class="mt-3">
    <button
      class="btn btn-warning"
      hx-post="/admin/anomalies/scan"
      hx-target="#anomaly-results"
      hx-swap="innerHTML"
      hx-indicator="#scan-spinner"
    >
      Scan for Anomalies
    </button>
    <span id="scan-spinner" class="htmx-indicator ms-2 spinner-border spinner-border-sm" role="status"></span>
  </div>
</div>

<section class="card">
  <div class="card-body p-0" id="anomaly-results">
    {% include "admin/_anomalies_table.html" %}
  </div>
</section>
{% endblock %}
