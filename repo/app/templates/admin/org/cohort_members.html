{% extends "base.html" %}

{% block title %}Cohort Members{% endblock %}

{% block content %}
<div class="page-hero">
  <div>
    <p class="section-eyebrow mb-1">Administration</p>
    <h1 class="page-title mb-0">Cohort Members</h1>
    <p class="page-subtitle mb-0">Manage membership for {{ cohort.name }}.</p>
  </div>
</div>

<section class="card">
  <div class="card-body">
    <h2 class="h5 mb-3">Add Member</h2>
    <form hx-post="/admin/org/cohorts/{{ cohort.id }}/members" hx-target="#members-table" hx-swap="innerHTML" class="mb-3">
      <div class="row">
        <div class="col-md-4">
          <select class="form-control" name="user_id" required>
            {% for u in users %}<option value="{{ u.id }}">{{ u.username }} ({{ u.role }})</option>{% endfor %}
          </select>
        </div>
        <div class="col-md-4">
          <select class="form-control" name="role_in_cohort" required>
            <option value="student">student</option>
            <option value="faculty_advisor">faculty_advisor</option>
            <option value="corporate_mentor">corporate_mentor</option>
          </select>
        </div>
        <div class="col-md-4"><button class="btn btn-primary" type="submit">Add Member</button></div>
      </div>
    </form>

    <div id="members-table">{% include "admin/org/_members_table.html" %}</div>
  </div>
</section>
{% endblock %}
