<form hx-post="/admin/questions" hx-target="#question-list" hx-swap="innerHTML" class="mb-3">
  <div class="row g-2 mb-2">
    <div class="col-md-2">
      <select class="form-control" name="school_id" required>
        {% for s in schools %}<option value="{{ s.id }}">{{ s.name }}</option>{% endfor %}
      </select>
    </div>
    <div class="col-md-2">
      <select class="form-control" name="question_type" required>
        <option value="single_choice">single_choice</option>
        <option value="multiple_choice">multiple_choice</option>
        <option value="true_false">true_false</option>
        <option value="fill_in">fill_in</option>
        <option value="short_answer">short_answer</option>
      </select>
    </div>
    <div class="col-md-4"><input class="form-control" name="stem" placeholder="Question stem" required></div>
    <div class="col-md-2"><input class="form-control" name="difficulty" placeholder="easy|medium|hard" value="medium"></div>
    <div class="col-md-2"><input class="form-control" name="score_points" placeholder="Points" value="1.0"></div>
  </div>
  <div class="row g-2 mb-2">
    <div class="col-md-6"><input class="form-control" name="options_text" placeholder="Options: opt1|opt2|opt3"></div>
    <div class="col-md-3"><input class="form-control" name="correct_answer" placeholder="Correct: A or A,C or text"></div>
    <div class="col-md-3"><input class="form-control" name="tags_text" placeholder="tag1,tag2"></div>
  </div>
  <div class="row g-2 mb-2">
    <div class="col-md-10"><input class="form-control" name="explanation" placeholder="Explanation"></div>
    <div class="col-md-2">
      <button type="submit" class="btn btn-primary" hx-disabled-elt="this">
        <span class="htmx-indicator spinner-border spinner-border-sm me-1" role="status"></span>
        Save Question
      </button>
    </div>
  </div>
</form>
