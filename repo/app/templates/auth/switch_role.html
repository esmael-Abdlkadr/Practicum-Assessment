{% extends "base.html" %}
{% block title %}Switch Role{% endblock %}
{% block content %}
<div class="row justify-content-center mt-4">
  <div class="col-md-5">
    <div class="card">
      <div class="card-header">Switch Active Role</div>
      <div class="card-body">
        <p class="text-muted mb-3">
          Current role: <strong>{{ current }}</strong>
        </p>
        <form hx-post="/switch-role" hx-swap="none">
          {% for role in available %}
          <div class="form-check mb-2">
            <input class="form-check-input" type="radio" name="role"
                   id="role_{{ role }}" value="{{ role }}"
                   {% if role == current %}checked{% endif %}>
            <label class="form-check-label" for="role_{{ role }}">{{ role }}</label>
          </div>
          {% endfor %}
          <button type="submit" class="btn btn-primary mt-3 w-100" hx-disabled-elt="this">
            <span class="htmx-indicator spinner-border spinner-border-sm me-1" role="status"></span>
            Switch Role
          </button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
