{% if success_message %}
  <div class="alert alert-success" role="alert">{{ success_message }}</div>
{% else %}
  <div class="card border-0 bg-light-subtle">
    <div class="card-body">
      <h2 class="h5 mb-3">Set up authenticator app</h2>
      <div class="mb-3 mfa-qr-wrap">{{ qr_svg|safe }}</div>
      <p class="text-muted">Scan this offline QR code in your authenticator app.</p>

      {% if error_message %}
        <div class="alert alert-danger" role="alert">{{ error_message }}</div>
      {% endif %}

      <form hx-post="/settings/mfa/verify-setup" hx-target="#mfa-setup-area" hx-swap="innerHTML" method="post">
        <div class="mb-3">
          <label for="totp_code" class="form-label">Enter 6-digit code</label>
          <input id="totp_code" name="totp_code" class="form-control" maxlength="6" required>
        </div>
        <button type="submit" class="btn btn-primary">Verify & Enable</button>
      </form>
    </div>
  </div>
{% endif %}
