services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      FLASK_APP: ${FLASK_APP:-app}
      FLASK_ENV: ${FLASK_ENV:-development}
      SECRET_KEY: ${SECRET_KEY:-}
      DATABASE_URL: ${DATABASE_URL:-sqlite:///data/practicum.db}
      SESSION_TYPE: ${SESSION_TYPE:-filesystem}
      SESSION_LIFETIME_MINUTES: ${SESSION_LIFETIME_MINUTES:-30}
      AUDIT_RETENTION_DAYS: ${AUDIT_RETENTION_DAYS:-1095}
    ports:
      - "5000:5000"
    volumes:
      - ./app:/app/app
      - ./data:/app/data
      - ./flask_session:/app/flask_session
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
